<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>View Project - Video Transcription App</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
      <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
      <link rel="stylesheet" th:href="@{/css/view-project.css}" />
  </head>
  <body class="bg-light">
    <div class="page-wrapper">
      <div th:replace="~{fragments/navbar :: navbar}"></div>

      <div class="body-layout">
        <div th:replace="~{fragments/sidebar :: sidebar(null)}"></div>

        <!-- ═══════════════════ MAIN CONTENT ═══════════════════ -->
        <main class="main-content">

          <!-- Loading state (shown while fetching) -->
          <div id="loading-state" class="loading-state">
            <div class="loading-spinner"></div>
            <span>Loading project...</span>
          </div>

          <!-- Project content (hidden until JS renders) -->
          <div id="project-content" style="display:none;">

            <!-- Breadcrumb -->
            <div class="breadcrumb-nav">
              <a href="/all-records">All records</a>
              <i class="bi bi-chevron-right breadcrumb-separator"></i>
              <span id="breadcrumb-project-name" class="breadcrumb-current">Loading...</span>
            </div>

            <div class="row g-4">
              <!-- ═══════ LEFT: Video + Summary ═══════ -->
              <div class="col-lg-8">

                <!-- Video player -->
                <div id="video-wrapper" class="video-wrapper">
                  <div class="video-overlay">
                    <div class="video-overlay-label">Now playing</div>
                    <div class="video-overlay-title">Loading...</div>
                  </div>
                  <div class="video-placeholder">
                    <span>Loading video...</span>
                  </div>
                </div>

                <!-- Summary -->
                <div class="summary-section">
                  <h2 class="summary-title">Summary</h2>
                  <div id="summary-content">
                    <p class="summary-placeholder">Loading summary...</p>
                  </div>
                </div>
              </div>

              <!-- ═══════ RIGHT: Transcript Segments ═══════ -->
              <div class="col-lg-4">
                <div class="transcript-panel" id="segments-container">
                  <div class="loading-state" style="padding:30px;">
                    <div class="loading-spinner"></div>
                    <span>Loading transcript...</span>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/view-project.js}"></script>
  </body>
</html>
