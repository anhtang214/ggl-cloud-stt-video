<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard - Video Transcription App</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
        <link rel="stylesheet" th:href="@{/css/video-upload.css}" />
<!--        <link rel="stylesheet" href="../static/css/dashboard.css" />-->
<!--        <link rel="stylesheet" href="../static/css/video-upload.css" />-->
    </head>
    <body class="bg-light">
        <div class="page-wrapper">
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <div class="body-layout">
                <div th:replace="~{fragments/sidebar :: sidebar(null)}"></div>

                <main class="main-content">
                    <div class="row g-4">
                        <div class="col-lg-8 d-flex flex-column gap-4">
                            <div class="card records-card border-0 shadow-sm">
                                <div class="upload-wrapper">
                                    <h1 class="upload-title">File Upload</h1>
                                    <div th:if="${message}">
                                        <h2 th:text="${/message}">
                                    </div>
                                    <form
                                            th:action="@{/upload}"
                                            method="POST"
                                            enctype="multipart/form-data"
                                            class="upload-card-body"
                                            id="uploadForm"
                                    >
                                        <div class="language-container d-flex">
                                            <div class="language-selector d-flex">
                                                <div class="language-option active flex-fill" onclick="selectLanguage(this)">
                                                    Monolingual
                                                </div>
                                                <div class="divider"></div>
                                                <div class="language-option flex-fill" onclick="selectLanguage(this)">
                                                    Bilingual
                                                </div>
                                            </div>
                                        </div>
                                        <div class="label-input-wrapper">
                                            <label class="input-label mb-1 d-block">Title</label>
                                            <input type="text" name="title" class="input-box title-input" placeholder="Your project title" />
                                        </div>
                                        <div class="upload-container">
                                            <div class="upload-content">
                                                <i class="bi bi-upload fs-1"></i>
                                                <div class="select-file-title">
                                                    Choose a file and upload securely to proceed.
                                                </div>
                                                <div class="upload-subtext">
                                                    MP4 format, up to 500MB
                                                </div>
                                                <input type="file" name="file" accept="video/mp4">
                                            </div>
                                        </div>
                                        <div class="label-input-wrapper">
                                            <label class="input-label mb-1 d-block">Choose language</label>
                                            <select class="form-select input-box language-select" name="language" required>
                                                <option value="" disabled selected>Choose language...</option>
                                                <option value="English">English</option>
                                                <option value="Vietnamese">Vietnamese</option>
                                            </select>
                                        </div>
                                        <div class="label-input-wrapper" id="language2-wrapper" style="display:none;">
                                            <label class="input-label mb-1 d-block">Choose second language</label>
                                            <select class="form-select input-box language-select" name="language2" disabled>
                                                <option value="" disabled selected>Choose language...</option>
                                                <option value="English">English</option>
                                                <option value="Vietnamese">Vietnamese</option>
                                            </select>
                                        </div>
                                        <div class="action-btn-container">
                                            <a class="action-btn cancel-btn" href="/dashboard">
                                                Cancel
                                            </a>
                                            <button class="action-btn attach-file-btn" type="submit" form="uploadForm">
                                                Attach File
                                            </button>
                                        </div>
                                    </form>
                                    <div>
                                        <ul>
                                            <li th:each="file : ${files}">
                                                <a th:href="${file}" th:text="${file}" />
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function selectLanguage(btn) {
                var options = btn.closest('.language-selector').querySelectorAll('.language-option');
                options.forEach(function(o) { o.classList.remove('active'); });
                btn.classList.add('active');

                var isBilingual = btn.textContent.trim() === 'Bilingual';
                var wrapper2 = document.getElementById('language2-wrapper');
                var select2  = wrapper2.querySelector('select');

                wrapper2.style.display = isBilingual ? 'block' : 'none';
                select2.disabled = !isBilingual;
                if (!isBilingual) select2.value = '';
            }
        </script>
    </body>
</html>
