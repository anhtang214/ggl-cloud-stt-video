<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard - Video Transcription App</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<!--        <link rel="stylesheet" th:href="@{/css/dashboard.css}" />-->
              <link rel="stylesheet" href="../static/css/dashboard.css" />
        <link rel="stylesheet" href="../static/css/video-upload.css" />
    </head>
    <body class="bg-light">
        <div class="page-wrapper">
            <header class="top-navbar">
                <div class="navbar-left">
                    <button class="hamburger-btn">
                        <i class="bi bi-list"></i>
                    </button>
                    <a href="#" class="navbar-logo">
                        <div class="logo-icon">
                            <i class="bi bi-soundwave"></i>
                        </div>
                        <span class="logo-text">HATA Notaking AI</span>
                    </a>
                    <div class="navbar-welcome">
                        <h2>Welcome Rosie!</h2>
                        <p>Hope you are healthy and happy today...</p>
                    </div>
                </div>

                <div class="navbar-right">
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="text" class="search-input" placeholder="Search..." />
                    </div>
                    <button class="trial-btn">Start Your 3-day Free Trial</button>
                    <button class="icon-btn">
                        <i class="bi bi-bell"></i>
                    </button>
                    <div class="profile-wrap">
                        <img
                                src="https://randomuser.me/api/portraits/women/44.jpg"
                                alt="Profile"
                                class="profile-img"
                        />
                        <i
                                class="bi bi-chevron-down text-muted"
                                style="font-size: 0.75rem"
                        ></i>
                    </div>
                </div>
            </header>
            <div class="body-layout">
                <aside class="sidebar">
                    <a href="#" class="nav-item active">
                        <i class="bi bi-house-fill"></i>
                        <span>Home</span>
                    </a>
                    <a href="#" class="nav-item">
                        <i class="bi bi-grid"></i>
                        <span>All records</span>
                    </a>
                    <hr class="nav-divider" />
                    <a href="#" class="nav-item">
                        <i class="bi bi-folder2"></i>
                        <span>BE09</span>
                    </a>
                    <a href="#" class="nav-item">
                        <i class="bi bi-folder2"></i>
                        <span>Uni CS30001</span>
                    </a>
                    <div class="sidebar-bottom">
                        <a href="#" class="nav-item">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </div>
                </aside>
                <main class="main-content">
                    <div class="row g-4">
                        <div class="col-lg-8 d-flex flex-column gap-4">
                            <div class="card records-card border-0 shadow-sm">
                                <div class="upload-wrapper">
                                    <h1 class="upload-title">File Upload</h1>
                                    <div class="upload-card-body">
                                        <div class="language-container d-flex">
                                            <div class="language-selector d-flex">
                                                <div class="language-option flex-fill" onclick="selectLanguage(this)">
                                                    Monolingual
                                                </div>
                                                <div class="divider"></div>
                                                <div class="language-option flex-fill" onclick="selectLanguage(this)">
                                                    Bilingual
                                                </div>
                                            </div>
                                        </div>
                                        <div class="label-input-wrapper">
                                            <label class="input-label mb-1 d-block">Title</label>
                                            <input type="text" class="input-box title-input" placeholder="Your project title" />
                                        </div>
                                        <div class="upload-container">
                                            <div class="upload-content">
                                                <i class="bi bi-upload fs-1"></i>
                                                <div class="upload-icon"></div>
                                                <div class="select-file-title">
                                                    Choose a file and upload securely to proceed.
                                                </div>
                                                <div class="upload-subtext">
                                                    MP4 format, up to 50MB
                                                </div>
                                                <button class="select-file-btn">
                                                    Select file
                                                </button>
                                            </div>
                                        </div>
                                        <div class="label-input-wrapper">
                                            <label class="input-label mb-1 d-block">Choose language</label>
                                            <select class="form-select input-box language-select">
                                                <option>Choose language...</option>
                                                <option>English</option>
                                                <option>Vietnamese</option>
                                            </select>
                                        </div>
                                        <div class="action-btn-container">
                                            <button class="action-btn cancel-btn">
                                                Cancel
                                            </button>
                                            <button class="action-btn attach-file-btn">
                                                Attach File
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
